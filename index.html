<!DOCTYPE html>
<html>

<head>
    <title>
        Controle do Permanência
    </title>
</head>
<link rel="stylesheet" href="style.css">
<script type="text/javascript" src="script.js"></script>

<body>
    <main>
        <div>
            <h1 class="pr">Controle do Permanência</h1>
            <br>
            <div id="pai">
                <div class="one">
                    <span>

                        <h3><img src="gen_furlan.jpeg" alt="GEN FURLAN"> GEN FURLAN <img id="furlan-arrow"></h3>
                        <button class="button" data-direction="esquerda"
                            onclick="changeArrow('furlan-arrow', this.getAttribute('data-direction'))">Esquerda</button>
                        <button class="button" data-direction="direita"
                            onclick="changeArrow('furlan-arrow', this.getAttribute('data-direction'))">Direita</button>
                        <button class="button" data-direction="desceu"
                            onclick="changeArrow('furlan-arrow', this.getAttribute('data-direction'))">Desceu</button>
                    </span>

                    <span>
                        <h3><img src="gen nigri.jpeg" alt="GEN NIGRI"> GEN NIGRI <img id="nigri-arrow"></h3>
                        <button class="button" data-direction="esquerda"
                            onclick="changeArrow('nigri-arrow', this.getAttribute('data-direction'))">Esquerda</button>
                        <button class="button" data-direction="direita"
                            onclick="changeArrow('nigri-arrow', this.getAttribute('data-direction'))">Direita</button>
                        <button class="button" data-direction="desceu"
                            onclick="changeArrow('nigri-arrow', this.getAttribute('data-direction'))">Desceu</button>
                    </span>

                    <span>
                        <h3><img src="gen dahmer.jpeg" alt="GEN DAHMER"> GEN DAHMER <img id="dahmer-arrow"></h3>
                        <button class="button" data-direction="esquerda"
                            onclick="changeArrow('dahmer-arrow', this.getAttribute('data-direction'))">Esquerda</button>
                        <button class="button" data-direction="direita"
                            onclick="changeArrow('dahmer-arrow', this.getAttribute('data-direction'))">Direita</button>
                        <button class="button" data-direction="desceu"
                            onclick="changeArrow('dahmer-arrow', this.getAttribute('data-direction'))">Desceu</button>
                    </span>

                </div>
                <div class="two">

                    <span>
                        <h3><img src="cel gilson.jpeg" alt="CEL GILSON"> CEL GILSON <img id="gilson-arrow"></h3>
                        <button class="button" data-direction="esquerda"
                            onclick="changeArrow('gilson-arrow', this.getAttribute('data-direction'))">Esquerda</button>
                        <button class="button" data-direction="direita"
                            onclick="changeArrow('gilson-arrow', this.getAttribute('data-direction'))">Direita</button>
                        <button class="button" data-direction="desceu"
                            onclick="changeArrow('gilson-arrow', this.getAttribute('data-direction'))">Desceu</button>
                    </span>

                    <span>
                        <h3><img src="ten fabio luiz.jpeg" alt="TEN FáBIO LUIZ"> TEN FÁBIO LUIZ <img
                                id="adj-arrow">
                        </h3>
                        <button class="button" data-direction="esquerda"
                            onclick="changeArrow('adj-arrow', this.getAttribute('data-direction'))">Esquerda</button>
                        <button class="button" data-direction="direita"
                            onclick="changeArrow('adj-arrow', this.getAttribute('data-direction'))">Direita</button>
                        <button class="button" data-direction="desceu"
                            onclick="changeArrow('adj-arrow', this.getAttribute('data-direction'))">Desceu</button>
                    </span>
                </div>
            </div>
            <div id="form-container">
                <button id="form-button" class="button" onclick="showForm()">Adicionar autoridade</button>
            </div>

            <div id="autoridade-form" style="display:none;">
                <input type="text" id="nome-autoridade" placeholder="Nome da autoridade" autofocus>
                <button class="button" onclick="addAutoridade()">Adicionar</button>
                <button class="button" onclick="cancelar()">Cancelar</button>
            </div>

        </div>
    </main>

    <footer>
        <hr style="margin-top:50px;" />
        <p class="text-center">&copy Feito por: SD ÂNGELO<img class="icon" src="person-military-rifle-solid.svg"
                alt="">
        </p>
    </footer>

</body>

</html>
